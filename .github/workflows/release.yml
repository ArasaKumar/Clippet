name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v0.1.0). Must already exist.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build release binary (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust (stable-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\clippet.exe dist\clippet.exe

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\clippet.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  clippet.exe" | Out-File -Encoding utf8 -FilePath dist\clippet.exe.sha256
          Write-Host "SHA-256: $hash"

      - name: Resolve tag name
        id: tag
        shell: pwsh
        run: |
          $t = '${{ github.event.inputs.tag }}'
          if (-not $t) { $t = '${{ github.ref_name }}' }
          echo "name=$t" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Clippet ${{ steps.tag.outputs.name }}
          body: |
            ## Clippet ${{ steps.tag.outputs.name }}

            **Platform:** Windows 11 x64
            **Architecture:** x86_64-pc-windows-msvc

            ### Installation
            1. Download `clippet.exe`.
            2. Verify (optional): compare `Get-FileHash clippet.exe -Algorithm SHA256` against `clippet.exe.sha256`.
            3. Run `clippet.exe` directly — no installer needed.
            4. Data is written to `%APPDATA%\clippet\` on first launch.

            ### Assets
            | File | Description |
            |------|-------------|
            | `clippet.exe` | Single-binary Windows clipboard manager |
            | `clippet.exe.sha256` | SHA-256 checksum for verification |
          generate_release_notes: true
          files: |
            dist/clippet.exe
            dist/clippet.exe.sha256
          fail_on_unmatched_files: true
